<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendaku - Taskflow Interaktif</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 600px;
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        h1 span {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        #taskInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }
        #taskInput:focus {
            outline: none;
            border-color: #667eea;
        }
        #addBtn {
            background: #667eea;
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #addBtn:hover {
            background: #5a67d8;
        }
        .task-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #666;
            font-size: 14px;
        }
        #taskList {
            list-style: none;
        }
        .task-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
            border-left: 5px solid #667eea;
        }
        .task-item.completed {
            border-left-color: #48bb78;
            opacity: 0.8;
        }
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #888;
        }
        .task-check {
            margin-right: 15px;
            transform: scale(1.2);
            cursor: pointer;
        }
        .task-text {
            flex: 1;
            font-size: 16px;
            word-break: break-word;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #f56565;
            font-size: 20px;
            cursor: pointer;
            padding: 0 5px;
            transition: color 0.3s;
        }
        .delete-btn:hover {
            color: #c53030;
        }
        .empty-message {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }
        footer {
            margin-top: 20px;
            text-align: center;
            color: #aaa;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            📋 Agenda 
            <span id="taskCounter">0</span>
        </h1>
        
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Tambah tugas baru...">
            <button id="addBtn">Tambah</button>
        </div>

        <div class="task-stats">
            <span>Total: <span id="totalTasks">0</span></span>
            <span>Selesai: <span id="completedTasks">0</span></span>
            <span>Belum: <span id="pendingTasks">0</span></span>
        </div>

        <ul id="taskList">
            <!-- Tugas akan ditampilkan di sini oleh JavaScript -->
        </ul>

        <footer>
            Data tersimpan otomatis di browser Anda
        </footer>
    </div>

    <script>
        // Ambil elemen DOM
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const taskCounter = document.getElementById('taskCounter');
        const totalTasksSpan = document.getElementById('totalTasks');
        const completedTasksSpan = document.getElementById('completedTasks');
        const pendingTasksSpan = document.getElementById('pendingTasks');

        // Inisialisasi array tugas dari localStorage
        let tasks = JSON.parse(localStorage.getItem('agendakuTasks')) || [];

        // Fungsi untuk menyimpan ke localStorage
        function saveTasks() {
            localStorage.setItem('agendakuTasks', JSON.stringify(tasks));
            renderTasks();
        }

        // Fungsi untuk memperbarui statistik
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(task => task.completed).length;
            const pending = total - completed;
            
            taskCounter.textContent = total;
            totalTasksSpan.textContent = total;
            completedTasksSpan.textContent = completed;
            pendingTasksSpan.textContent = pending;
        }

        // Fungsi untuk menampilkan tugas
        function renderTasks() {
            taskList.innerHTML = '';
            
            if (tasks.length === 0) {
                taskList.innerHTML = '<li class="empty-message">Belum ada tugas. Yuk tambah!</li>';
            } else {
                tasks.forEach((task, index) => {
                    const li = document.createElement('li');
                    li.className = `task-item ${task.completed ? 'completed' : ''}`;
                    
                    // Checkbox
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'task-check';
                    checkbox.checked = task.completed;
                    checkbox.addEventListener('change', () => toggleTask(index));
                    
                    // Teks tugas
                    const span = document.createElement('span');
                    span.className = 'task-text';
                    span.textContent = task.text;
                    
                    // Tombol hapus
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'delete-btn';
                    deleteBtn.innerHTML = '&times;';
                    deleteBtn.addEventListener('click', () => deleteTask(index));
                    
                    li.appendChild(checkbox);
                    li.appendChild(span);
                    li.appendChild(deleteBtn);
                    
                    taskList.appendChild(li);
                });
            }
            
            updateStats();
        }

        // Fungsi menambah tugas
        function addTask() {
            const text = taskInput.value.trim();
            if (text === '') {
                alert('Tugas tidak boleh kosong!');
                return;
            }
            
            tasks.push({
                text: text,
                completed: false
            });
            
            taskInput.value = '';
            saveTasks();
        }

        // Fungsi toggle status selesai
        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            saveTasks();
        }

        // Fungsi hapus tugas
        function deleteTask(index) {
            tasks.splice(index, 1);
            saveTasks();
        }

        // Event listener
        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        // Render awal
        renderTasks();
    </script>
</body>
</html>
