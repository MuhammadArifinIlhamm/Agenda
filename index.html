<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskflow - Agenda</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
            border-bottom: 2px solid #6c63ff;
            padding-bottom: 10px;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background-color: white;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-left: 5px solid #6c63ff;
        }
        .selesai {
            border-left-color: #4caf50;
            text-decoration: line-through;
            color: #888;
        }
        .proses {
            border-left-color: #ff9800;
        }
        .pending {
            border-left-color: #f44336;
        }
    </style>
</head>
<body>
    <h1>📋 Taskflow Saya</h1>
    <ul>
        <li class="selesai">✅ Mengerjakan tugas kampus</li>
        <li class="proses">🔄 Membeli bahan makanan</li>
        <li class="pending">⏳ Menyelesaikan laporan proyek</li>
        <li>📅 Belajar GitHub Pages</li>
    </ul>
</body>
</html>
